<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>母亲节快乐 - 唯美康乃馨</title>
    <style>
        :root {
            --carnation-pink: #FFB7C5;
            --carnation-red: #E57373;
            --cream-white: #FFFDD0;
            --leaf-green: #90A17D;
            --text-color: #5D5D5D;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: radial-gradient(circle at center, #fffafa 0%, #fce4ec 100%);
            font-family: 'Optima', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            color: var(--text-color);
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 30px;
            box-sizing: border-box;
            z-index: 10;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: auto;
        }

        .header h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 300;
            letter-spacing: 10px;
            color: var(--carnation-red);
            text-shadow: 2px 2px 4px rgba(229, 115, 115, 0.2);
        }

        .control-panel {
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(229, 115, 115, 0.3);
            padding: 15px;
            border-radius: 16px;
            backdrop-filter: blur(10px);
            min-width: 240px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.05);
        }

        .music-toggle {
            position: absolute;
            top: 30px;
            right: 30px;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid var(--carnation-red);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            pointer-events: auto;
            z-index: 30;
            transition: all 0.3s ease;
        }
        .music-toggle.muted {
            opacity: 0.5;
        }
        .music-toggle.playing svg {
            animation: rotate 4s linear infinite;
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        #video-container {
            position: absolute;
            bottom: 30px;
            right: 30px;
            width: 180px;
            height: 135px;
            border: 2px solid #fff;
            border-radius: 16px;
            overflow: hidden;
            transform: scaleX(-1);
            z-index: 20;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        video { width: 100%; height: 100%; object-fit: cover; }

        #status-text {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: var(--carnation-red);
            font-size: 13px;
            letter-spacing: 2px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(5px);
            padding: 8px 25px;
            border-radius: 30px;
            border: 1px solid rgba(229, 115, 115, 0.2);
            z-index: 15;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        #wish-text {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-width: 600px;
            text-align: center;
            color: #6d4c41;
            font-size: 18px;
            font-weight: 300;
            line-height: 1.6;
            letter-spacing: 2px;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            padding: 20px 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 183, 197, 0.4);
            opacity: 0;
            transition: opacity 0.8s ease, transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 12;
            pointer-events: none;
            box-shadow: 0 10px 40px rgba(229, 115, 115, 0.1);
        }
        #wish-text.visible {
            opacity: 1;
            transform: translateX(-50%) translateY(-20px);
        }
    </style>
</head>
<body>

<div id="canvas-container"></div>

<div class="ui-overlay">
    <div class="header">
        <div>
            <h1>母亲节快乐！</h1>
            <p style="font-size:11px; opacity:0.8; letter-spacing:4px; margin-top:8px; color: #a67b7b;">爱在花间 · 唯美康乃馨</p>
        </div>
        <div class="control-panel">
            <div style="font-size:11px; color: var(--carnation-red); font-weight: bold; margin-bottom: 8px;">手势感应指南：</div>
            <div style="font-size:9px; color: #a67b7b; text-align:left; line-height:1.8;">
                ✋ <b>张开手掌</b>：康乃馨盛放，可点击照片放大<br>
                ✊ <b>握拳</b>：温柔包裹，粒子凝聚<br>
                👌 <b>指尖捏合</b>：聚焦并放大爱的影像
            </div>
        </div>
    </div>
    
    <div id="music-btn" class="music-toggle">
        <svg id="music-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#E57373" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 18V5l12-2v13"></path>
            <circle cx="6" cy="18" r="3"></circle>
            <circle cx="18" cy="16" r="3"></circle>
        </svg>
    </div>
</div>

<div id="wish-text"></div>
<div id="status-text">正在启动感应系统...</div>

<div id="video-container">
    <video id="webcam" autoplay playsinline width="640" height="480"></video>
</div>

<!-- 依赖 -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
    }
}
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

    const CONFIG = {
        bouquet: { radius: 3.5, height: 7 },
        colors: {
            cream: 0xFFFDD0,
            softPink: 0xFFB7C5,
            carnationRed: 0xE57373,
            leaf: 0x90A17D,
            star: 0xFFF9C4,
            heart: 0xFF8A80
        },
        photoUrls: [
            "https://i.imgur.com/RH4pNHt.jpg",
            "https://i.imgur.com/JOgFoRW.jpg",
            "https://i.imgur.com/dU2tGiV.jpg",
            "https://i.imgur.com/SKs5Uct.jpg",
            "https://i.imgur.com/xkrByBa.jpg",
            "https://i.imgur.com/11LIr4M.jpg",
            "https://i.imgur.com/gvBNemx.jpg",
            "https://i.imgur.com/dkOcEXn.jpg"
        ],
        wishes: [
            "妈妈，长大后才懂，您才是这辈子最爱我、最包容我的人。",
            "谢谢您把最好的年华都给了我，辛苦了我的妈妈。",
            "时光慢一点吧，别再让我的妈妈慢慢变老了。",
            "不管多大，在您眼里我永远是孩子，有您真好。",
            "您从不把爱挂在嘴边，却把所有温柔都给了我。",
            "这辈子最幸运的事，就是做了您的孩子。",
            "妈妈，余生愿您无烦恼，平安健康，被温柔以待。",
            "您的碎碎念念，撑起了我整个温暖的童年。",
            "母亲节快乐，我最爱的妈妈，往后只愿您好好享福。"
        ]
    };

    let scene, camera, renderer, composer, controls, raycaster, mouse;
    let bouquetPoints, backgroundDust, photoGroup, decorGroup;
    let handState = { found: false, spread: 0, posX: 0, isPinching: false, smoothedSpread: 0, smoothedPinch: 0 };
    let selectedPhoto = null;
    let clock = new THREE.Clock();
    const textureLoader = new THREE.TextureLoader();

    // 音频管理
    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
    let isMuted = false;
    let lastSpread = 0;
    let lastPinch = false;

    function playPianoNote(freq, duration = 2.5, volume = 0.1) {
        if (isMuted || audioContext.state === 'suspended') return;
        const now = audioContext.currentTime;
        const osc = audioContext.createOscillator();
        const gain = audioContext.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(freq, now);
        gain.gain.setValueAtTime(0, now);
        gain.gain.linearRampToValueAtTime(volume, now + 0.1);
        gain.gain.exponentialRampToValueAtTime(0.001, now + duration);
        const filter = audioContext.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(1000, now);
        filter.frequency.exponentialRampToValueAtTime(200, now + duration);
        osc.connect(filter);
        filter.connect(gain);
        gain.connect(audioContext.destination);
        osc.start(now);
        osc.stop(now + duration);
    }

    async function initAudio() {
        const melody = [311.13, 349.23, 392.00, 466.16, 311.13, 349.23, 392.00, 523.25, 466.16, 392.00, 349.23, 311.13];
        let noteIndex = 0;
        setInterval(() => {
            if (!isMuted && audioContext.state !== 'suspended') {
                playPianoNote(melody[noteIndex % melody.length], 4, 0.05);
                if (noteIndex % 2 === 0) playPianoNote(melody[noteIndex % melody.length] / 2, 6, 0.03);
                noteIndex++;
            }
        }, 2500);
        window.playInteractionSound = (type) => {
            if (isMuted || audioContext.state === 'suspended') return;
            switch(type) {
                case 'bloom': playPianoNote(523.25 * 1.5, 1.5, 0.08); break;
                case 'click': playPianoNote(392.00, 0.8, 0.1); break;
                case 'pinch': playPianoNote(311.13, 1.2, 0.06); break;
            }
        };
    }

    async function init() {
        scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0xfce4ec, 20, 100);
        camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(15, 8, 20);
        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.3;
        raycaster = new THREE.Raycaster();
        mouse = new THREE.Vector2();
        scene.add(new THREE.AmbientLight(0xffffff, 1.2));

        createDynamicBackground();
        createCarnationBouquet();
        createDecorations(); 
        createPhotoFragments();
        setupPostProcessing();
        initHandTracking();
        initAudio();

        window.addEventListener('resize', onWindowResize);
        window.addEventListener('click', onDocumentClick);
        document.getElementById('music-btn').addEventListener('click', function() {
            isMuted = !isMuted;
            if (audioContext.state === 'suspended') audioContext.resume();
            this.classList.toggle('muted', isMuted);
            this.classList.toggle('playing', !isMuted);
        });
        animate();
    }

    function createDecorations() {
        decorGroup = new THREE.Group();
        const createHeartShape = () => {
            const s = new THREE.Shape(); s.moveTo(0, 0); s.bezierCurveTo(0.5, 0.5, 1, 0, 0, -1); s.bezierCurveTo(-1, 0, -0.5, 0.5, 0, 0); return s;
        };
        const heartGeo = new THREE.ShapeGeometry(createHeartShape());
        const starGeo = new THREE.CircleGeometry(0.1, 5);
        for (let i = 0; i < 200; i++) {
            const isHeart = Math.random() > 0.4;
            const mat = new THREE.MeshBasicMaterial({ color: isHeart ? CONFIG.colors.heart : CONFIG.colors.star, transparent: true, opacity: 0.4 + Math.random() * 0.4, side: THREE.DoubleSide });
            const mesh = new THREE.Mesh(isHeart ? heartGeo : starGeo, mat);
            const r = 10 + Math.random() * 25, theta = Math.random() * Math.PI * 2, phi = Math.random() * Math.PI;
            mesh.position.set(r * Math.sin(phi) * Math.cos(theta), r * Math.cos(phi), r * Math.sin(phi) * Math.sin(theta));
            mesh.scale.setScalar(0.05 + Math.random() * 0.15);
            mesh.userData = { speed: Math.random() * 0.01 + 0.005, phase: Math.random() * Math.PI * 2 };
            decorGroup.add(mesh);
        }
        scene.add(decorGroup);
    }

    function createDynamicBackground() {
        const geo = new THREE.BufferGeometry(); const pos = [];
        for (let i = 0; i < 1500; i++) pos.push((Math.random() - 0.5) * 100, (Math.random() - 0.5) * 100, (Math.random() - 0.5) * 100);
        geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
        backgroundDust = new THREE.Points(geo, new THREE.PointsMaterial({ size: 0.1, color: 0xffffff, transparent: true, opacity: 0.2 }));
        scene.add(backgroundDust);
    }

    function createCarnationBouquet() {
        const geo = new THREE.BufferGeometry(); const positions = [], origins = [], colors = [], velocities = [];
        const count = 40000;
        const colorPalette = [new THREE.Color(CONFIG.colors.cream), new THREE.Color(CONFIG.colors.softPink), new THREE.Color(CONFIG.colors.carnationRed), new THREE.Color(CONFIG.colors.leaf)];
        for (let i = 0; i < count; i++) {
            const v = Math.random(), theta = Math.random() * Math.PI * 2, py = (v - 0.5) * CONFIG.bouquet.height;
            let radiusFactor, pColor, vMult = 1.0;
            if (py < -1.0) {
                radiusFactor = 1.5 + (py + 3.5) * 0.4; pColor = colorPalette[0].clone().lerp(colorPalette[1], 0.3); vMult = 0.3;
            } else {
                const rand = Math.random(), layer = Math.floor(rand * 5); radiusFactor = (1.2 + layer * 0.6) * (1 + Math.sin(theta * 20) * 0.1);
                pColor = rand > 0.4 ? (rand > 0.8 ? colorPalette[1] : colorPalette[2]) : colorPalette[3]; vMult = rand > 0.4 ? 1.2 : 0.8;
            }
            const px = Math.cos(theta) * radiusFactor, pz = Math.sin(theta) * radiusFactor;
            origins.push(px, py, pz); positions.push(px, py, pz); velocities.push(px * vMult, py * 0.5 * vMult, pz * vMult); colors.push(pColor.r, pColor.g, pColor.b);
        }
        geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
        geo.setAttribute('origin', new THREE.Float32BufferAttribute(origins, 3));
        geo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
        geo.setAttribute('velocity', new THREE.Float32BufferAttribute(velocities, 3));
        bouquetPoints = new THREE.Points(geo, new THREE.PointsMaterial({ size: 0.05, vertexColors: true, transparent: true, opacity: 0.7 }));
        scene.add(bouquetPoints);
    }

    function createPhotoFragments() {
        photoGroup = new THREE.Group();
        CONFIG.photoUrls.forEach((url, i) => {
            // 加载纹理并根据原始比例创建几何体
            textureLoader.load(url, (texture) => {
                texture.colorSpace = THREE.SRGBColorSpace;
                const image = texture.image;
                const aspect = image.width / image.height;
                
                const baseHeight = 2.8;
                const baseWidth = baseHeight * aspect;
                
                const material = new THREE.MeshStandardMaterial({ 
                    map: texture, side: THREE.DoubleSide, transparent: true, opacity: 0, roughness: 0.9, metalness: 0
                });
                const photo = new THREE.Mesh(new THREE.PlaneGeometry(baseWidth, baseHeight), material);
                
                const angle = (i / CONFIG.photoUrls.length) * Math.PI * 2, radius = 10 + Math.random() * 2;
                photo.position.set(Math.cos(angle) * radius, (Math.random()-0.5)*8 + 4, Math.sin(angle) * radius);
                photo.userData = { originalPos: photo.position.clone(), id: i };
                photoGroup.add(photo);
            });
        });
        scene.add(photoGroup);
    }

    function showRandomWish() {
        const wishEl = document.getElementById('wish-text');
        wishEl.innerText = CONFIG.wishes[Math.floor(Math.random() * CONFIG.wishes.length)];
        wishEl.classList.add('visible');
    }

    function hideWish() { document.getElementById('wish-text').classList.remove('visible'); }

    function onDocumentClick(event) {
        if (audioContext.state === 'suspended') audioContext.resume();
        if (handState.smoothedSpread < 0.4) return;
        mouse.x = (event.clientX / window.innerWidth) * 2 - 1; mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(photoGroup.children);
        if (intersects.length > 0) {
            window.playInteractionSound('click');
            const clicked = intersects[0].object;
            if (selectedPhoto === clicked) { selectedPhoto = null; hideWish(); }
            else { selectedPhoto = clicked; showRandomWish(); }
        } else { selectedPhoto = null; hideWish(); }
    }

    function setupPostProcessing() {
        composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));
        composer.addPass(new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.15, 0.4, 0.9));
    }

    function initHandTracking() {
        const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const lm = results.multiHandLandmarks[0]; handState.found = true; handState.posX = (lm[0].x - 0.5) * 2;
                const d48 = Math.sqrt(Math.pow(lm[4].x - lm[8].x, 2) + Math.pow(lm[4].y - lm[8].y, 2));
                handState.isPinching = d48 < 0.05;
                const dBaseTip = Math.sqrt(Math.pow(lm[8].x - lm[0].x, 2) + Math.pow(lm[8].y - lm[0].y, 2));
                handState.spread = THREE.MathUtils.clamp((dBaseTip - 0.1) / 0.4, 0, 1);
                if (handState.spread > 0.8 && lastSpread <= 0.8) window.playInteractionSound('bloom');
                if (handState.isPinching && !lastPinch) window.playInteractionSound('pinch');
                lastSpread = handState.spread; lastPinch = handState.isPinching;
                if (handState.spread < 0.3 && selectedPhoto) { selectedPhoto = null; hideWish(); }
                document.getElementById('status-text').innerText = selectedPhoto ? "✨ 查看珍贵瞬间" : (handState.isPinching ? "👌 已聚焦爱意" : (handState.spread > 0.6 ? "✋ 点击照片可放大" : "✋ 感应中..."));
            } else {
                handState.found = false; handState.spread = 0; document.getElementById('status-text').innerText = "✋ 请将手放在摄像头视野内";
            }
        });
        new window.Camera(document.getElementById('webcam'), {
            onFrame: async () => { await hands.send({ image: document.getElementById('webcam') }); }, width: 640, height: 480
        }).start().catch(() => document.getElementById('status-text').innerText = "❌ 摄像头开启失败");
    }

    function animate() {
        requestAnimationFrame(animate); const time = clock.getElapsedTime();
        handState.smoothedSpread += (handState.spread - handState.smoothedSpread) * 0.1;
        handState.smoothedPinch += ((handState.isPinching ? 1 : 0) - handState.smoothedPinch) * 0.1;
        if (handState.found && !selectedPhoto) {
            controls.autoRotateSpeed = handState.posX * 2; camera.position.y += (8 + handState.posX * 1.5 - camera.position.y) * 0.05;
        }
        if (bouquetPoints) {
            const posAttr = bouquetPoints.geometry.attributes.position; const origAttr = bouquetPoints.geometry.attributes.origin; const velAttr = bouquetPoints.geometry.attributes.velocity;
            const factor = handState.smoothedSpread * 4.2; 
            for (let i = 0; i < posAttr.count; i++) posAttr.setXYZ(i, origAttr.getX(i) + velAttr.getX(i) * factor, origAttr.getY(i) + velAttr.getY(i) * factor, origAttr.getZ(i) + velAttr.getZ(i) * factor);
            posAttr.needsUpdate = true;
        }
        if (photoGroup) {
            photoGroup.children.forEach((photo) => {
                const visibility = THREE.MathUtils.smoothstep(handState.smoothedSpread, 0.4, 0.8); photo.material.opacity = visibility;
                if (selectedPhoto === photo) {
                    const camDir = new THREE.Vector3(); camera.getWorldDirection(camDir);
                    photo.position.lerp(camera.position.clone().add(camDir.multiplyScalar(7.5)), 0.1); photo.scale.lerp(new THREE.Vector3(2.2, 2.2, 2.2), 0.1); photo.quaternion.slerp(camera.quaternion, 0.1);
                } else {
                    const targetScale = visibility * (1 + handState.smoothedPinch * 1.2); photo.scale.lerp(new THREE.Vector3(targetScale, targetScale, targetScale), 0.1);
                    if(handState.isPinching && visibility > 0.4) photo.position.lerp(new THREE.Vector3(0, 3.5, 0), 0.05);
                    else photo.position.lerp(photo.userData.originalPos.clone().add(new THREE.Vector3(0, Math.sin(time + photo.userData.id) * 0.4, 0)), 0.07);
                    photo.quaternion.slerp(camera.quaternion, 0.05);
                }
            });
        }
        if (decorGroup) decorGroup.children.forEach(decor => {
            decor.position.y += Math.sin(time * 0.4 + decor.userData.phase) * 0.015; decor.rotation.z += decor.userData.speed; decor.lookAt(camera.position);
        });
        if (backgroundDust) backgroundDust.rotation.y += 0.0005;
        controls.update(); composer.render();
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); composer.setSize(window.innerWidth, window.innerHeight);
    }
    window.onload = init;
</script>
</body>
</html>
